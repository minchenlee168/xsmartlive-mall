<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>直播管家商城</title>
    <!--
      GitHub Pages SPA fallback（採 rafrex/spa-github-pages 方案）：把原 URL 包成
      query string 後 redirect 回 index.html；index.html 啟動 script 再 replaceState 還原。

      pathSegmentsToKeep = 1 表示保留 base path 第一段（/xsmartlive-all-prototype/）。
    -->
    <script>
      ;(function () {
        var pathSegmentsToKeep = 1
        var l = window.location
        l.replace(
          l.protocol
            + '//'
            + l.hostname
            + (l.port ? ':' + l.port : '')
            + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/')
            + '/?/'
            + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~')
            + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '')
            + l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
