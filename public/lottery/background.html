<!DOCTYPE html>
<html lang="zh-TW"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xSmartLive 抽獎背景</title>
<style>
  :root{ --cyan:#00C8FF; --pink:#F032FF; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;}

  .viewport{ position:fixed; inset:0; background:#000; }
  .framestage{
    position:absolute; left:50%; top:50%;
    width:1920px; height:1080px;
    transform:translate(-50%,-50%) scale(var(--s,1));
    transform-origin:center center;
    overflow:hidden;
  }

  /* ── Night-sky brand gradient base ── */
  .sky-base{
    position:absolute; inset:-10%;
    background:linear-gradient(122deg,#1b0a23 0%,#11071c 24%,#06060f 50%,#051018 74%,#08222e 100%);
    background-size:200% 200%;
    animation:skyFlow 9s ease-in-out infinite;
  }
  @keyframes skyFlow{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

  .sky-flow{ position:absolute; inset:0; overflow:hidden; }
  .flow{ position:absolute; border-radius:50%; filter:blur(58px); mix-blend-mode:screen; will-change:transform; }
  .flow.pink{ width:1100px; height:760px; left:6%; top:-12%;
    background:radial-gradient(closest-side, rgba(240,50,255,.50), transparent 72%); animation:drift1 10s ease-in-out infinite; }
  .flow.cyan{ width:1200px; height:820px; right:2%; bottom:-16%;
    background:radial-gradient(closest-side, rgba(0,200,255,.48), transparent 72%); animation:drift2 11.5s ease-in-out infinite; }
  .flow.violet{ width:900px; height:620px; left:40%; top:30%;
    background:radial-gradient(closest-side, rgba(150,70,255,.34), transparent 72%); animation:drift3 12.5s ease-in-out infinite; }
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(290px,160px) scale(1.2);}66%{transform:translate(-170px,90px) scale(.88);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(-280px,-170px) scale(1.18);}66%{transform:translate(180px,-80px) scale(.9);}}
  @keyframes drift3{0%,100%{transform:translate(-50%,0) scale(1);}50%{transform:translate(-50%,-170px) scale(1.28);}}

  /* central lighter glow — keeps robot's black outline readable */
  .core-glow{
    position:absolute; left:50%; top:50%;
    width:1360px; height:1180px; transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 48%,
      rgba(224,210,248,.62) 0%, rgba(168,140,224,.40) 24%, rgba(104,98,168,.22) 48%, transparent 70%);
    filter:blur(12px); animation:breathe 7.5s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.82; transform:translate(-50%,-50%) scale(1);}50%{opacity:1; transform:translate(-50%,-50%) scale(1.05);}}
  .floor-glow{
    position:absolute; left:50%; top:74%; width:780px; height:240px; transform:translate(-50%,-50%);
    background:radial-gradient(50% 50% at 50% 50%, rgba(0,200,255,.30) 0%, rgba(240,50,255,.16) 46%, transparent 76%);
    filter:blur(12px); animation:breathe 7.5s ease-in-out infinite;
  }

  /* ── faraway blurred glow stars (added, twinkling) ── */
  .gstar-layer{ position:absolute; inset:0; pointer-events:none; }
  .gstar{
    position:absolute; border-radius:50%;
    background:radial-gradient(circle, #ffffff 0%, rgba(255,255,255,.55) 38%, transparent 72%);
    animation:gtwinkle ease-in-out infinite; will-change:transform,opacity;
  }
  @keyframes gtwinkle{0%,100%{opacity:.1; transform:scale(.65);}50%{opacity:.9; transform:scale(1.18);}}

  /* ── added 4-point sparkle stars (yellow-marked spots) ── */
  .spark-layer{ position:absolute; inset:0; pointer-events:none; }
  .spark{ position:absolute; transform-origin:center center;
    animation:sparkTwinkle ease-in-out infinite; will-change:transform,opacity; }
  .spark svg{ display:block; width:100%; height:100%;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.65)); }
  @keyframes sparkTwinkle{0%,100%{opacity:.2; transform:scale(.62) rotate(0deg);}50%{opacity:1; transform:scale(1.1) rotate(0deg);}}

  /* ── fireworks + sharp stars (inlined SVG material, recoloured white) ── */
  .fx{ position:absolute; inset:0; }
  .fx svg{ width:100%; height:100%; display:block;
    filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,.55)); }
  #BACKGROUND{ display:none; }
  .halo{ display:none; }

  .fw{ transform-box:fill-box; transform-origin:center center;
    animation:bloom 2.5s ease-in-out var(--delay,0s) infinite; will-change:transform,opacity; }
  @keyframes bloom{
    0%{transform:scale(.24); opacity:0;}
    11%{opacity:1;}
    30%{transform:scale(1); opacity:1;}
    46%{transform:scale(1.06); opacity:.75;}
    62%{transform:scale(1.12); opacity:0;}
    100%{transform:scale(1.12); opacity:0;}
  }
  .star{ display:none; }

  .bg-vignette{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(78% 78% at 50% 52%, transparent 50%, rgba(0,0,0,.55) 100%); }

  /* ── linear starlight burst (xSmartLive midpoint #7880FF) — the INITIAL draw-phase background ── */
  .burst{ position:absolute; inset:0; width:100%; height:100%;
    mix-blend-mode:screen; pointer-events:none; transition:opacity .3s ease; }
  /* fireworks celebration layer starts hidden; revealed after the win ── */
  #fxLayer{ opacity:0; transition:opacity .3s ease; }
  /* ── fast white-flash transition overlay ── */
  .flash{ position:absolute; inset:0; background:#fff; opacity:0;
    pointer-events:none; z-index:20; }

  /* ── robot hero (no bubbles) ── */
  .hero{
    position:absolute; left:50%; top:51%; width:480px; height:425px;
    transform:translate(-50%,-50%) scale(1.62); transform-origin:center center; z-index:5;
    filter:drop-shadow(0 22px 42px rgba(0,0,0,.6)) drop-shadow(0 0 30px rgba(0,200,255,.18));
  }
  .rbt-wrapper{ position:relative; width:480px; height:425px; overflow:visible; }
  .rbt-stage{ position:absolute; inset:0; z-index:1; }
  .rbt-stage img{ position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:contain; object-position:center bottom; opacity:0; }
  .rbt-stage img.active{ opacity:1; }

  /* === 內嵌「得獎轉場（置中版 960×425）」抽獎動畫，置中於 1920×1080 舞台 === */

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
    /* 機器人 + 機台置中於 960×425 畫面；兩側留白讓獎球滾落、圓環置中 */
    .wrapper {
      position: relative;
      width: 960px;
      height: 425px;
      overflow: hidden;
    }
    .stage {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    /* 機台圖 480 寬置中於 960 畫面（左右各留 240） */
    .stage img {
      position: absolute;
      top: 0; left: 240px;
      width: 480px; height: 425px;
      object-fit: contain;
      object-position: left bottom;
      opacity: 0;
    }
    .stage img.active { opacity: 1; }
    /* 獎球：實際 PNG 圖層，放在最下方（z-index:0），由機台後方滾出 */
    #prize-ball {
      position: absolute;
      top: 0; left: 0;
      width: 42px; height: 42px;
      z-index: 0;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
    }
    /* 得獎者圓框轉場圖層（落在 960×425 畫面正中央） */
    #winner-solid, #winner-ring {
      position: absolute;
      left: 480px; top: 213px;
      width: 260px; height: 260px;
      transform-origin: center center;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      will-change: transform, opacity;
    }
    #winner-solid { transform: translate(-50%, -50%) scale(0.16); }
    #winner-ring  { transform: translate(-50%, -50%) scale(0.34); }
  
  .framestage > .wrapper{
    position:absolute !important; left:50%; top:50%;
    transform:translate(-50%,-50%) scale(1.62); transform-origin:center center;
    z-index:8; overflow:visible !important;
    filter:drop-shadow(0 22px 42px rgba(0,0,0,.55)) drop-shadow(0 0 30px rgba(0,200,255,.16));
  }
</style>

<script>
  /* ── letterbox scaling ── */
  const stage = document.getElementById('framestage');
  function fit(){ stage.style.setProperty('--s', Math.min(window.innerWidth/1920, window.innerHeight/1080)); }
  window.addEventListener('resize', fit); fit();

  /* ── faraway blurred glow stars — placed only in zones clear of the robot ── */
  (function(){
    const layer = document.getElementById('gstarLayer');
    const zones = [
      {x0:30,  x1:1890, y0:20,  y1:170},   // top
      {x0:30,  x1:1890, y0:915, y1:1060},  // bottom
      {x0:24,  x1:512,  y0:170, y1:915},   // left
      {x0:1408,x1:1896, y0:170, y1:915},   // right
    ];
    const rand=(a,b)=>a+Math.random()*(b-a);
    for(let i=0;i<34;i++){
      const z = zones[Math.floor(Math.random()*zones.length)];
      const x = rand(z.x0,z.x1), y = rand(z.y0,z.y1);
      const s = rand(5,17);
      const blur = rand(0.6,2.6).toFixed(1);
      const d = layer.appendChild(document.createElement('div'));
      d.className='gstar';
      d.style.cssText =
        `left:${x.toFixed(0)}px; top:${y.toFixed(0)}px; width:${s.toFixed(0)}px; height:${s.toFixed(0)}px;`+
        `filter:blur(${blur}px);`+
        `animation-duration:${rand(1.8,4).toFixed(1)}s; animation-delay:-${rand(0,4).toFixed(1)}s;`;
    }
  })();

  /* ── added twinkling 4-point sparkle stars at marked spots (big/med/small) ── */
  (function(){
    const layer = document.getElementById('sparkLayer');
    const star = (c,s)=>`<svg viewBox="0 0 100 100"><path d="M50 0 C56 34 66 44 100 50 C66 56 56 66 50 100 C44 66 34 56 0 50 C34 44 44 34 50 0Z" fill="${c}"/></svg>`;
    const spots = [
      {x:220, y:200, s:54, d:2.4, delay:0},     // top-left      (big)
      {x:958, y:300, s:26, d:1.9, delay:0.9},   // right of dome  (small) — moved down
      {x:1528,y:284, s:38, d:2.7, delay:1.6},   // far right     (medium)
      {x:1660,y:852, s:26, d:2.1, delay:0.5},   // bottom-right  (small) — moved right
      {x:527, y:488, s:34, d:2.3, delay:1.2},   // left of robot (medium)
      {x:1650,y:520, s:38, d:2.6, delay:0.3},   // far right     (medium) — moved right
      {x:301, y:620, s:28, d:2.0, delay:1.8},   // lower-left    (small)
    ];
    spots.forEach(p=>{
      const el = layer.appendChild(document.createElement('div'));
      el.className='spark';
      el.style.cssText =
        `left:${p.x - p.s/2}px; top:${p.y - p.s/2}px; width:${p.s}px; height:${p.s}px;`+
        `animation-duration:${p.d}s; animation-delay:-${p.delay}s;`;
      el.innerHTML = star('#ffffff', p.s);
    });
  })();
</script>



<script>
/* ── linear starlight burst engine — #7880FF comet streaks, the INITIAL draw-phase background ── */
  // 原型階段：光束預設關閉，由父頁面 postMessage 'start-burst' 觸發
  let __burstActive = false;
  (function(){
    const cv=document.getElementById('burstLayer');
    if(!cv) return;
    const ctx=cv.getContext('2d');
    const W=1920,H=1080,CX=960,CY=540,TAU=Math.PI*2;
    const rand=(a,b)=>a+Math.random()*(b-a);
    const reach=Math.hypot(W/2,H/2)+60;
    const MAX=120;

    // comet sprite, built once: tail(transparent) -> head(white-violet) + head glow
    const SPW=320, SPH=44;
    const sp=document.createElement('canvas'); sp.width=SPW; sp.height=SPH;
    const sx=sp.getContext('2d');
    const lg=sx.createLinearGradient(0,0,SPW,0);
    lg.addColorStop(0,'rgba(120,128,255,0)');
    lg.addColorStop(0.55,'rgba(120,128,255,0.42)');
    lg.addColorStop(0.92,'rgba(170,176,255,0.96)');
    lg.addColorStop(1,'rgba(225,228,255,1)');
    sx.fillStyle=lg; sx.fillRect(0,0,SPW,SPH);
    sx.globalCompositeOperation='destination-in';
    const vg=sx.createLinearGradient(0,0,0,SPH);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(0.5,'rgba(0,0,0,1)');
    vg.addColorStop(1,'rgba(0,0,0,0)');
    sx.fillStyle=vg; sx.fillRect(0,0,SPW,SPH);
    sx.globalCompositeOperation='lighter';
    const hgs=sx.createRadialGradient(SPW-9,SPH/2,0,SPW-9,SPH/2,SPH*0.9);
    hgs.addColorStop(0,'rgba(228,230,255,0.95)');
    hgs.addColorStop(0.5,'rgba(150,158,255,0.40)');
    hgs.addColorStop(1,'rgba(120,128,255,0)');
    sx.fillStyle=hgs; sx.fillRect(SPW-SPH,0,SPH,SPH);

    let streaks=[];
    function spawn(){
      if(streaks.length>=MAX) return;
      const hot=Math.random()<0.18;
      streaks.push({
        a:Math.random()*TAU, r:rand(0,26), v:rand(3.5,4.5), acc:rand(1.030,1.052),
        len: hot?rand(340,520):rand(200,360),
        w:   hot?rand(10,16):rand(5,9),
        bright: hot?rand(0.85,1):rand(0.30,0.62)
      });
    }
    function frame(){
      if(!__burstActive){ ctx.clearRect(0,0,W,H); return; }   // stop & clear after the win
      ctx.clearRect(0,0,W,H);
      ctx.globalCompositeOperation='lighter';
      let emit=2+(Math.random()<0.6?1:0); while(emit-->0) spawn();
      for(const s of streaks){
        s.v*=s.acc; s.r+=s.v;
        const t=s.r/reach;
        const fadeIn=Math.min(1,s.r/110);
        const fadeOut=t>0.86?Math.max(0,(1-t)/0.14):1;
        const a=s.bright*fadeIn*fadeOut;
        if(a<=0.012) continue;
        const tailR=Math.max(0,s.r-s.len-s.v*2.2);
        const segLen=s.r-tailR; if(segLen<=1) continue;
        ctx.globalAlpha=Math.min(1,a);
        ctx.save();
        ctx.translate(CX,CY); ctx.rotate(s.a);
        ctx.drawImage(sp, tailR, -s.w/2, segLen, s.w);
        ctx.restore();
      }
      ctx.globalAlpha=1;
      streaks=streaks.filter(s=>s.r<reach+s.len);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    // 原型階段：暴露重啟入口，父頁面觸發 'start-burst' 後可重新進入動畫迴圈
    window.__startBurst = () => {
      if (__burstActive) return;
      __burstActive = true;
      requestAnimationFrame(frame);
    };
  })();

  /* ── 獎球掉出後：快速閃白幕 → 線性星光背景切換為煙火慶祝背景 ── */
  function goCelebrate(){
    const flash=document.getElementById('flash');
    const burst=document.getElementById('burstLayer');
    const fx=document.getElementById('fxLayer');
    // 1) 柔和淡入：不透明度 0.7、淡入 .35s
    flash.style.transition='opacity .35s ease-out';
    flash.style.opacity='0.7';
    // 2) 在白幕半透明時切換背景（柔和過場）
    setTimeout(()=>{
      __burstActive=false;
      if(burst){ burst.style.transition='opacity .25s ease'; burst.style.opacity='0'; }
      if(fx){ if(fx.getAnimations) fx.getAnimations().forEach(a=>a.cancel()); fx.style.transition='opacity .35s ease'; fx.style.opacity='1'; }
    }, 350);
    // 3) 白幕柔和淡出
    setTimeout(()=>{
      flash.style.transition='opacity .6s ease-in';
      flash.style.opacity='0';
    }, 450);
  }

  /* 背景由父頁面 postMessage 控制：'start-burst' 啟動光束、'stop-burst' 立即停下、'celebrate' 切換煙火慶祝 */
  window.addEventListener('message', (event) => {
    if (event.data === 'start-burst') {
      window.__startBurst?.();
    } else if (event.data === 'stop-burst') {
      __burstActive = false;
    } else if (event.data === 'celebrate') {
      goCelebrate();
    }
  });
</script>
</body></html>
