<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>還沒開始抽獎（靜態）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
    /* 機器人 + 機台置中於 960×425 畫面；兩側留白讓獎球滾落、圓環置中 */
    .wrapper {
      position: relative;
      width: 960px;
      height: 425px;
      overflow: hidden;
    }
    .stage {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    /* 機台圖 480 寬置中於 960 畫面（左右各留 240） */
    .stage img {
      position: absolute;
      top: 0; left: 240px;
      width: 480px; height: 425px;
      object-fit: contain;
      object-position: left bottom;
      opacity: 0;
    }
    .stage img.active { opacity: 1; }
    /* 獎球：實際 PNG 圖層，放在最下方（z-index:0），由機台後方滾出 */
    #prize-ball {
      position: absolute;
      top: 0; left: 0;
      width: 42px; height: 42px;
      z-index: 0;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
    }
    /* 得獎者圓框轉場圖層（落在 960×425 畫面正中央） */
    #winner-solid, #winner-ring {
      position: absolute;
      left: 480px; top: 213px;
      width: 260px; height: 260px;
      transform-origin: center center;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      will-change: transform, opacity;
    }
    #winner-solid { transform: translate(-50%, -50%) scale(0.16); }
    #winner-ring  { transform: translate(-50%, -50%) scale(0.34); }
  </style>
</head>
